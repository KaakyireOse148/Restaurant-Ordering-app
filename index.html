<!DOCTYPE html>
<html>
    <head>
        <title>Restaurant Ordering App</title>
         <link rel="stylesheet" href="style.css">
        <!-- Google fonts -->
         <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Montserrat:ital,
wght@0,100..900;1,100..900&family=Orbitron&family=Playfair:ital,opsz,wght@0,5..1200,300..900;
1,5..1200,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A==" crossorigin="anonymous" referrerpolicy="no-referrer" /> 
    </head>
    <body>
        <header>
            <h1>Edinara's Dinner</h1>
            <p class="header_para">The best burgers and pizzas in town</p>
        </header>
        <main id="content">
            <section class="feed" id="feed-container">
                  <!-- The Dinners are rendered here -->
            </section>

            <article  id="order-feed">
              <!-- The Dinner Selectd are rendered here -->
            </article>

            <form class="form-el" id="form-details">
                <h2 class="form-head">Enter Card Details</h2>
                <label for="name">Your Name</label>
                <input name="fullname" id='name'placeholder="eg.Kaakyire Osei Bonsu" required>
                <label for="card-number">Card Number</label>
                 <input name="card-number" id="card-number"placeholder="eg. 4111 1111 1111 1111" required>
                 <label for="cvv">Enter CVV</label>
                 <input name="CVV" id='cvv'placeholder=" 4-digit code printed on the front of the card" required> 
                <button type="submit" id="pay-btn" class="pay-btn">Pay</button>
            </form>
            <div class="chatbox-bg">
            <i class="fa-solid fa-headset"></i>
           </div>
        </main>
        <script type="module" src="index.js"></script>
    </body>
</html>
